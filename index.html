<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aayush Mondkar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><style>text%7Bfill:%23000%7D@media(prefers-color-scheme:dark)%7Btext%7Bfill:%23fff%7D%7D</style><text x='8' y='12.5' text-anchor='middle' font-size='13' font-weight='bold' font-family='sans-serif'>:)</text></svg>" />
  <style>
    *, *:hover, *:focus { cursor: none !important; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: #121212;
    }

    /* ---------- NAV (Win98) ---------- */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #c0c0c0;
      z-index: 50;
      border-bottom: 2px solid #404040;
    }
    .win98-titlebar {
      background: linear-gradient(to right, #4a4a4a 0%, #7a7a7a 100%);
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 4px 4px 8px;
      user-select: none;
    }
    .win98-title {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ffffff;
      font-family: "Tahoma", "MS Sans Serif", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      min-width: 0;
      flex: 1;
    }
    .win98-icon { width: 18px; height: 18px; flex-shrink: 0; display: block; }
    .win98-controls { display: flex; gap: 2px; margin-left: 6px; flex-shrink: 0; }
    .win98-btn {
      width: 22px; height: 22px;
      background: #c0c0c0;
      border: 1px solid #000000;
      box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #808080;
      font-family: "MS Sans Serif", "Tahoma", Arial, sans-serif;
      font-size: 11px; font-weight: bold; line-height: 1;
      color: #000000;
      display: flex; align-items: center; justify-content: center;
      padding: 0 0 1px;
    }
    .win98-btn:active { box-shadow: inset -1px -1px 0 #ffffff, inset 1px 1px 0 #808080; }
    .menubar {
      padding: 2px 6px;
      height: 38px;
      display: flex;
      align-items: center;
      border-top: 1px solid #ffffff;
      border-bottom: 1px solid #808080;
    }
    .nav-links { display: flex; }
    .nav-links a {
      font-family: "MS Sans Serif", "Tahoma", Arial, sans-serif;
      font-size: 14px; font-weight: 400;
      color: #000000;
      padding: 4px 12px;
      display: block;
      letter-spacing: 0;
    }
    .nav-links a:hover { background: #5a5a5a; color: #ffffff; opacity: 1; }

    /* ---------- LANDING ---------- */
    #landing {
      position: fixed;
      top: 72px;
      left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      padding: 40px 56px;
    }

    #big-text {
      font-family: "Helvetica Neue", "Helvetica", Arial, sans-serif;
      font-weight: 700;
      line-height: 1.04;
      letter-spacing: -0.025em;
      color: #121212;
      width: 100%;
      overflow-wrap: break-word;
      word-break: normal;
    }

    /* Blinking block caret during typewriter */
    #big-text.typing::after {
      content: '\25AE';
      animation: caret-blink 0.65s step-end infinite;
      margin-left: 0.03em;
    }
    @keyframes caret-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ---------- CURSOR ---------- */
    #cursor-el {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      opacity: 0;
      will-change: transform;
    }
    #cursor-label {
      margin-top: 4px;
      margin-left: 2px;
      font-family: "Tahoma", "MS Sans Serif", Arial, sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #000000;
      text-shadow:
        -1px -1px 0 #fff,  1px -1px 0 #fff,
        -1px  1px 0 #fff,  1px  1px 0 #fff,
         0   -2px 0 #fff,  0    2px 0 #fff,
        -2px  0   0 #fff,  2px  0   0 #fff;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #cursor-label.visible { opacity: 1; }

    /* Touch devices get a fixed hint instead of the cursor label */
    #tap-hint {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      font-family: "Tahoma", "MS Sans Serif", Arial, sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #000000;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #tap-hint.visible { opacity: 1; }

    @media (max-width: 600px) {
      #landing { padding: 24px 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      #big-text.typing::after { animation: none; }
    }
  </style>
</head>
<body>

  <div id="cursor-el">
    <svg width="16" height="23" viewBox="0 0 16 23" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 1 1 L 1 15 L 5.5 10.5 L 10 19.5 L 12 18.5 L 7.5 9.5 L 13.5 9.5 Z"
            fill="white" stroke="black" stroke-width="1.5"
            stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
    <div id="cursor-label">click to continue</div>
  </div>

  <nav>
    <div class="win98-titlebar">
      <div class="win98-title">
        <svg class="win98-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1" y="1" width="14" height="11" fill="#fff" stroke="#000" stroke-width="1"/>
          <rect x="2" y="2" width="12" height="3" fill="#5a5a5a"/>
          <rect x="4" y="5" width="8" height="6" fill="#c0c0c0"/>
          <rect x="5" y="12" width="6" height="2" fill="#c0c0c0"/>
          <rect x="2" y="14" width="12" height="1" fill="#404040"/>
        </svg>
        <span>Aayush Mondkar · Portfolio</span>
      </div>
      <div class="win98-controls">
        <button class="win98-btn" aria-label="Minimize" tabindex="-1">_</button>
        <button class="win98-btn" aria-label="Maximize" tabindex="-1">□</button>
        <button class="win98-btn" aria-label="Close" tabindex="-1">✕</button>
      </div>
    </div>
    <div class="menubar">
      <div class="nav-links">
        <a href="portfolio.html#about">About</a>
        <a href="portfolio.html#work">Work</a>
        <a href="portfolio.html#contact">Contact</a>
      </div>
    </div>
  </nav>

  <div id="landing">
    <p id="big-text"></p>
  </div>
  <div id="tap-hint" aria-hidden="true">tap to continue</div>

  <script>
    const COPY = "Curious enough to design anything and everything. Visual designer crafting thoughtful, considered work across identity, print, and digital. Noticing the smallest details and being inspired by it is what keeps me going.";

    const el        = document.getElementById('big-text');
    const landing   = document.getElementById('landing');
    const label     = document.getElementById('cursor-label');
    const cursorEl  = document.getElementById('cursor-el');
    const reduced   = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // ---------- Font size fitting ----------
    function fitText() {
      const availH = landing.clientHeight - 80;
      const saved  = el.textContent;
      const wasCaret = el.classList.contains('typing');

      // Measure with full text, no caret class
      el.classList.remove('typing');
      el.textContent = COPY;

      let lo = 10, hi = 600;
      for (let i = 0; i < 22; i++) {
        const mid = (lo + hi) / 2;
        el.style.fontSize = mid + 'px';
        if (el.offsetHeight <= availH) lo = mid; else hi = mid;
      }
      el.style.fontSize = Math.floor(lo) + 'px';

      // Restore
      el.textContent = saved;
      if (wasCaret) el.classList.add('typing');
    }

    fitText();
    window.addEventListener('resize', fitText);

    // ---------- Cursor tracking ----------
    let cursorVisible = false;
    document.addEventListener('mousemove', (e) => {
      if (!cursorVisible) { cursorEl.style.opacity = '1'; cursorVisible = true; }
      cursorEl.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    }, { passive: true });

    // ---------- Typewriter ----------
    const touchOnly = window.matchMedia('(hover: none)').matches;
    const tapHint   = document.getElementById('tap-hint');

    function onTypingDone() {
      el.classList.remove('typing');
      label.classList.add('visible');
      if (touchOnly) tapHint.classList.add('visible');
    }

    if (reduced) {
      el.textContent = COPY;
      label.classList.add('visible');
      if (touchOnly) tapHint.classList.add('visible');
    } else {
      el.classList.add('typing');
      let i = 0;
      const DELAY = 15;

      function tick() {
        if (i >= COPY.length) { onTypingDone(); return; }
        el.textContent = COPY.slice(0, ++i);
        setTimeout(tick, DELAY);
      }
      setTimeout(tick, 260);
    }

    // ---------- Click to continue ----------
    landing.addEventListener('click', () => {
      if (document.body.dataset.exiting) return;
      document.body.dataset.exiting = '1';
      sessionStorage.setItem('from-landing', '1');
      window.location.href = 'portfolio.html';
    });

    // Back/forward cache restore (phone back gesture) revives the page with
    // the exiting flag still set - clear it so tapping works again
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) delete document.body.dataset.exiting;
    });
  </script>

  <script src="win98-eggs.js" defer></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
